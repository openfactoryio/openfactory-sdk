# ----------------------------------------------------------------------------------
# Prometheus rules for the OpenFactory Connector
#
# Purpose:
#   This file contains recording rules for metrics generated by Connector Coordinator
#   and Gateway components. Users can drop this file into their Prometheus setup
#   and reference it under the rule_files section.
#
# How to use:
#   In prometheus.yml, include it with rule_files:
#
#   rule_files:
#     - "connector_rules.yml"
#
# Notes:
#   - Each group defines a set of related rules with a common evaluation interval.
#   - Labels defined in each rule (component, role) will be attached to the
#     resulting metrics and can be used for filtering or aggregating.
# ----------------------------------------------------------------------------------

groups:

  - name: connector_coordinator_metrics
    interval: 15s
    rules:
      # Build info per coordinator
      - record: coordinator:build_info
        expr: coordinator_build_info
        labels:
          component: "connector"
          role: "coordinator"

      # Rate of device assignments per second
      - record: coordinator:device_assignments_rate
        expr: rate(device_assignments_total[1m])
        labels:
          component: "connector"
          role: "coordinator"

      # Average latency for assigning a device
      - record: coordinator:device_assignment_latency_avg
        expr: sum(rate(device_assignment_latency_seconds_sum[1m]))
              /
              sum(rate(device_assignment_latency_seconds_count[1m]))
        labels:
          component: "connector"
          role: "coordinator"

      # 95th percentile latency for device assignments
      - record: coordinator:device_assignment_latency_p95
        expr: histogram_quantile(
                0.95,
                sum(rate(device_assignment_latency_seconds_bucket[1m])) by (le)
              )
        labels:
          component: "connector"
          role: "coordinator"

  - name: connector_gateway_metrics
    interval: 15s
    rules:
      # Build info per gateway
      - record: gateway:build_info
        expr: gateway_build_info
        labels:
          component: "connector"
          role: "gateway"

      # Total devices across all gateways
      - record: gateway:total_devices
        expr: sum(gateway_devices_count)
        labels:
          component: "connector"
          role: "gateway"

      # Number of devices on a single gateway
      - record: gateway:devices_per_gateway
        expr: gateway_devices_count
        labels:
          component: "connector"
          role: "gateway"

      # Kafka message throughput per gateway (messages/sec)
      - record: gateway:kafka_messages_rate_per_gateway
        expr: delta(kafka_tx_messages_total[1m]) / 60
        labels:
          component: "connector"
          role: "gateway"

      # Total message throughput (messages/sec)
      - record: gateway:kafka_messages_rate_total
        expr: sum(delta(kafka_tx_messages_total[1m]) / 60)
        labels:
          component: "connector"
          role: "gateway"

      # Kafka data throughput per gateway (bytes/sec)
      - record: gateway:kafka_data_rate_per_gateway
        expr: delta(kafka_tx_bytes_total[1m]) / 60
        labels:
          component: "connector"
          role: "gateway"

      # Total data throughput (bytes/sec)
      - record: gateway:kafka_data_rate_total
        expr: sum(delta(kafka_tx_bytes_total[1m]) / 60)
        labels:
          component: "connector"
          role: "gateway"

      # Average Kafka batchcnt per gateway (second)
      - record: gateway:kafka_batchcnt_avg_per_gateway
        expr: kafka_batch_count_avg
        labels:
          component: "connector"
          role: "gateway"

      # P95 Kafka batchcnt per gateway (second)
      - record: gateway:kafka_batch_count_p95_per_gateway
        expr: kafka_batch_count_p95
        labels:
          component: "connector"
          role: "gateway"

      # Messages queued inside librdkafka
      - record: gateway:kafka_queue_messages_per_gateway
        expr: kafka_queue_messages
        labels:
          component: "connector"
          role: "gateway"

      # Bytes queued inside librdkafka
      - record: gateway:kafka_queue_bytes_per_gateway
        expr: kafka_queue_bytes
        labels:
          component: "connector"
          role: "gateway"

      # Average Kafka broker round trip time per broker (second)
      - record: gateway:kafka_broker_rtt_avg_seconds
        expr: kafka_broker_rtt_avg_seconds
        labels:
          component: "connector"
          role: "gateway"

      # P95 Kafka broker round trip time per broker (second)
      - record: gateway:kafka_broker_rtt_p95_seconds
        expr: kafka_broker_rtt_p95_seconds
        labels:
          component: "connector"
          role: "gateway"

      # Rate of Kafka transmission errors per broker
      - record: gateway:kafka_tx_errors_rate_per_broker
        expr: delta(kafka_tx_errors_total[1m]) / 60
        labels:
          component: "connector"
          role: "gateway"

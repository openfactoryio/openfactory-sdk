# ------------------------------------------------------------------------------
# Traefik Reverse Proxy (OpenFactory Routing Gateway - Docker only)
# ------------------------------------------------------------------------------
# This Docker Compose service defines a Traefik reverse proxy used to expose
# OpenFactory applications via HTTP(S) using host-based routing.
#
# Core Responsibilities:
# - Dynamically discover Docker services and their labels
# - Route incoming HTTP requests to the correct application container
# - Expose the Traefik dashboard for monitoring and debugging
#
# Routing Model:
# - Applications are exposed using **Traefik labels** generated by OpenFactory
# - Routing is based on the HTTP Host header (e.g. app.openfactory.local)
# - Each application runs as an independent service with its own router
#
# Included Features:
# - Docker provider with label-based configuration
# - Explicit exposure control (`exposedByDefault=false`)
# - HTTP (port 80) and HTTPS (port 443) entrypoints
# - Built-in Traefik API and dashboard
#
# Dashboard Access:
# - The dashboard is exposed via host-based routing:
#
#     http://traefik.openfactory.local/dashboard/
#
# - Requires a matching DNS entry pointing to the Traefik host
#
# Notes:
# - This setup is suitable for development and staging environments
# - TLS is not configured by default (can be added via certificates or Let's Encrypt)
# - Requires Docker socket access for service discovery
# - All services to be exposed must be connected to the same network (`factory-net`)
# - Traefik is an external dependency (Apache License 2.0)
# - The official Traefik Docker image is pulled at runtime
# - OpenFactory leverages Traefik for HTTP routing (thanks to the Traefik community)
#
# Networking:
# - Uses an external Docker network (`factory-net`)
# - All OpenFactory applications must join this network to be routable
#
# References:
# - Traefik Documentation: https://doc.traefik.io/traefik/
# - Docker Provider: https://doc.traefik.io/traefik/providers/docker/
# ------------------------------------------------------------------------------

services:
  traefik:
    image: traefik:v3.6
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --api=true
      - --api.dashboard=true
      - --log.level=DEBUG

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    networks:
      - factory-net

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=(Host(`traefik.openfactory.local`) || Host(`localhost`)) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
      - "traefik.http.routers.dashboard.entrypoints=web"
      - "traefik.http.routers.dashboard.service=api@internal"

networks:
  factory-net:
    external: true

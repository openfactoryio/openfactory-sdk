# ----------------------------------------------------------------------------------
# Prometheus rules for OpenFactory process-level monitoring
#
# Purpose:
#   This file contains generic recording rules based on the standard
#   Prometheus Python ProcessCollector metrics. These rules provide
#   normalized process health indicators that can be reused across all
#   OpenFactory services, including coordinators, gateways, adapters,
#   applications, and infrastructure components.
#
# How to use:
#   In prometheus.yml, include it with rule_files:
#
#   rule_files:
#     - "openfactory_process_rules.yml"
#
# Notes:
#   - These rules require the Prometheus Python client ProcessCollector
#     to be enabled in the monitored application.
#   - File descriptor metrics are only available on Unix-like systems.
#   - CPU usage is reported in CPU cores consumed, where:
#         1.0 = one fully utilized CPU core
#         0.5 = half a CPU core
#         2.0 = two fully utilized CPU cores
#   - Memory metrics are reported in megabytes (MB).
#   - These recording rules simplify dashboard creation and capacity
#     planning by exposing resource usage in engineering-friendly units.
# ----------------------------------------------------------------------------------

groups:
  - name: openfactory_process
    interval: 15s
    rules:

      # Open file descriptors
      - record: process:open_fds
        expr: process_open_fds

      # FD usage (%)
      - record: process:open_fds_percent
        expr: 100 * process_open_fds / process_max_fds

      # CPU usage (cores)
      - record: process:cpu_cores
        expr: rate(process_cpu_seconds_total[1m])

      # Resident memory (MB)
      - record: process:memory_resident_mb
        expr: process_resident_memory_bytes / 1024 / 1024

      # Virtual memory (MB)
      - record: process:memory_virtual_mb
        expr: process_virtual_memory_bytes / 1024 / 1024

      # Process uptime (hours)
      - record: process:uptime_hours
        expr: (time() - process_start_time_seconds) / 3600
